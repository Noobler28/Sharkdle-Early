<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sharkdle Pre-Release</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07121f;
      --card: #0d1b2a;
      --text: #e8f1ff;
      --muted: #9fb3c8;
      --accent: #4cc9f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #12304d 0%, var(--bg) 60%);
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(560px, 100%);
      background: rgba(13, 27, 42, 0.92);
      border: 1px solid rgba(76, 201, 240, 0.18);
      border-radius: 20px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: 0.03em;
    }

    p {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.6;
      color: var(--muted);
    }

    .badge {
      display: inline-block;
      margin-bottom: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(76, 201, 240, 0.12);
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Pre-Release Tester Build</div>
    <h1>Sharkdle</h1>
    <p>No update to test right now.</p>
  </main>
</body>
</html>
